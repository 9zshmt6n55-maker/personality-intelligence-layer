<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PKM Orb</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const normalize = (value) => {
          const text = String(value || "").trim().toLowerCase().replaceAll("_", "-");
          if (["zh", "chinese", "china", "cp936", "gbk", "gb2312", "936"].some((marker) => text.includes(marker))) return "zh";
          if (text.startsWith("en") || text.includes("english")) return "en";
          return "";
        };
        const candidates = [params.get("lang"), ...Array.from(navigator.languages || []), navigator.language];
        const lang = candidates.map(normalize).find(Boolean) || "en";
        const locale = lang === "zh" ? "zh-CN" : "en-US";
        document.documentElement.lang = locale;
        document.title = lang === "zh" ? "PKM 人格球" : "PKM Orb";
        window.PDK_PUBLIC_UI = { lang, locale };
      })();
    </script>
    <link rel="stylesheet" href="./orb.css" />
  </head>
  <body>
    <div class="orb-world" aria-label="PKM standalone orb">
      <div class="grain"></div>
      <div id="orbDock" class="orb-dock">
        <canvas id="orbCanvas"></canvas>
      </div>
    </div>
    <script src="./orb.js"></script>
    <script>
      (() => {
        const world = document.querySelector(".orb-world");
        if (world && window.PDK_PUBLIC_UI?.lang === "zh") {
          world.setAttribute("aria-label", "PKM 独立人格球");
        }
      })();
    </script>
  </body>
</html>
